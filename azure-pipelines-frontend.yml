# Azure DevOps Pipeline for TCA-IRR Frontend
# Deploys Next.js frontend to Azure App Service
# 
# SETUP INSTRUCTIONS:
# 1. Go to Azure DevOps > Pipelines > New Pipeline > Azure Repos Git
# 2. Select "TCA-IRR" repository  
# 3. Select "Existing Azure Pipelines YAML file"
# 4. Choose "/azure-pipelines-frontend.yml"
# 5. Create Azure Service Connection (recommended):
#    - Project Settings > Service Connections > New > Azure Resource Manager
#    - Name: "AzureServiceConnection" 
#    - Select subscription containing resource group "DEV"
#
# OR set Pipeline Variables (alternative):
#    - WEBAPP_DEPLOY_USER = $TCA-IRR
#    - WEBAPP_DEPLOY_PASS = [password from Azure Portal > App Service > Deployment Center]

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - public/**
      - package.json
      - package-lock.json
      - next.config.ts
      - azure-pipelines-frontend.yml
    exclude:
      - '*.md'
      - docker-context/**
      - '*.py'

pool:
  vmImage: 'ubuntu-latest'

variables:
  appServiceName: 'TCA-IRR'
  resourceGroupName: 'DEV'
  nodeVersion: '20.x'

stages:
  - stage: Build
    displayName: 'Build Next.js App'
    jobs:
      - job: BuildJob
        displayName: 'Build & Package'
        timeoutInMinutes: 30
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Setup Node.js $(nodeVersion)'

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: node_modules
            displayName: 'Cache node_modules'

          - script: npm ci --legacy-peer-deps
            displayName: 'Install Dependencies'

          - script: |
              export NODE_ENV=production
              export NEXT_PUBLIC_APP_ENV=production
              export NEXT_PUBLIC_API_URL=https://tcairrapiccontainer.azurewebsites.net
              npm run build
            displayName: 'Build Next.js'

          - script: |
              mkdir -p $(Build.ArtifactStagingDirectory)/app
              
              # Copy .next build output
              cp -r .next $(Build.ArtifactStagingDirectory)/app/
              
              # Copy public assets
              cp -r public $(Build.ArtifactStagingDirectory)/app/
              
              # Copy package files
              cp package.json $(Build.ArtifactStagingDirectory)/app/
              [ -f package-lock.json ] && cp package-lock.json $(Build.ArtifactStagingDirectory)/app/
              [ -f next.config.ts ] && cp next.config.ts $(Build.ArtifactStagingDirectory)/app/
              [ -f next.config.js ] && cp next.config.js $(Build.ArtifactStagingDirectory)/app/
              
              # Create server.js for Azure App Service
              cat > $(Build.ArtifactStagingDirectory)/app/server.js << 'EOF'
const { createServer } = require("http");
const { parse } = require("url");
const next = require("next");

const hostname = "0.0.0.0";
const port = parseInt(process.env.PORT || "3000", 10);

const app = next({ dev: false, hostname, port, dir: __dirname });
const handle = app.getRequestHandler();

app.prepare().then(() => {
  createServer(async (req, res) => {
    try {
      const parsedUrl = parse(req.url, true);
      await handle(req, res, parsedUrl);
    } catch (err) {
      console.error("Error handling", req.url, err);
      res.statusCode = 500;
      res.end("Internal Server Error");
    }
  })
  .once("error", (err) => {
    console.error(err);
    process.exit(1);
  })
  .listen(port, () => {
    console.log(`> Ready on http://${hostname}:${port}`);
  });
});
EOF
              
              # Create web.config for IIS
              cat > $(Build.ArtifactStagingDirectory)/app/web.config << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<configuration>
  <system.webServer>
    <webSocket enabled="false" />
    <handlers>
      <add name="iisnode" path="server.js" verb="*" modules="iisnode"/>
    </handlers>
    <rewrite>
      <rules>
        <rule name="NodeInspector" patternSyntax="ECMAScript" stopProcessing="true">
          <match url="^server.js\/debug[\/]?" />
        </rule>
        <rule name="StaticContent">
          <action type="Rewrite" url="public{REQUEST_URI}"/>
        </rule>
        <rule name="DynamicContent">
          <conditions>
            <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True"/>
          </conditions>
          <action type="Rewrite" url="server.js"/>
        </rule>
      </rules>
    </rewrite>
    <httpErrors existingResponse="PassThrough" />
    <iisnode watchedFiles="web.config;*.js" node_env="production" />
  </system.webServer>
</configuration>
EOF
              
              # Create .env.production
              cat > $(Build.ArtifactStagingDirectory)/app/.env.production << 'EOF'
NEXT_PUBLIC_APP_ENV=production
NEXT_PUBLIC_API_URL=https://tcairrapiccontainer.azurewebsites.net
EOF
              
              # Install production dependencies
              cd $(Build.ArtifactStagingDirectory)/app
              npm install --omit=dev --legacy-peer-deps
              
              echo "=== Package contents ==="
              ls -la
              du -sh .
            displayName: 'Create Deployment Package'

          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/app'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/frontend.zip'
            displayName: 'Create ZIP Archive'

          - publish: $(Build.ArtifactStagingDirectory)/frontend.zip
            artifact: frontend
            displayName: 'Publish Artifact'

  - stage: Deploy
    displayName: 'Deploy to Azure'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployToAzure
        displayName: 'Deploy to App Service'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: frontend

                # Deploy using Kudu ZIP Deploy with deployment credentials
                - script: |
                    echo "Deploying to Azure App Service..."
                    
                    DEPLOY_USER="$(WEBAPP_DEPLOY_USER)"
                    DEPLOY_PASS="$(WEBAPP_DEPLOY_PASS)"
                    
                    if [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_PASS" ]; then
                      echo "##[error]Deployment credentials not set!"
                      echo "##[error]Set pipeline variables: WEBAPP_DEPLOY_USER and WEBAPP_DEPLOY_PASS"
                      echo "##[error]Get from Azure Portal > App Service > Deployment Center > FTPS credentials"
                      exit 1
                    fi
                    
                    curl -X POST \
                      -u "$DEPLOY_USER:$DEPLOY_PASS" \
                      --data-binary @"$(Pipeline.Workspace)/frontend/frontend.zip" \
                      -H "Content-Type: application/zip" \
                      "https://$(appServiceName).scm.azurewebsites.net/api/zipdeploy" \
                      --fail --show-error -w "\nHTTP Status: %{http_code}\n"
                    
                    echo ""
                    echo "========================================"
                    echo "  Deployed to $(appServiceName)"
                    echo "  URL: https://$(appServiceName).azurewebsites.net"
                    echo "========================================"
                  displayName: 'Deploy via Kudu ZIP Deploy'
                  env:
                    WEBAPP_DEPLOY_USER: $(WEBAPP_DEPLOY_USER)
                    WEBAPP_DEPLOY_PASS: $(WEBAPP_DEPLOY_PASS)

  - stage: Verify
    displayName: 'Verify Deployment'
    dependsOn: Deploy
    condition: succeeded()
    jobs:
      - job: HealthCheck
        displayName: 'Health Check'
        steps:
          - script: |
              echo "Waiting for app to start..."
              sleep 30
              
              echo "Checking deployment..."
              for i in 1 2 3 4 5; do
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://$(appServiceName).azurewebsites.net/" --max-time 30 || echo "000")
                echo "Attempt $i: HTTP $HTTP_CODE"
                
                if [ "$HTTP_CODE" = "200" ]; then
                  echo "✅ Deployment successful!"
                  exit 0
                fi
                
                sleep 15
              done
              
              echo "⚠️ App may still be starting. Check https://$(appServiceName).azurewebsites.net"
            displayName: 'Verify App is Running'
