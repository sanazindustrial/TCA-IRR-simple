<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="wg" x1="5" y1="75" x2="75" y2="5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9C6F0A"/>
      <stop offset="50%" stop-color="#C8900A"/>
      <stop offset="100%" stop-color="#F5C330"/>
    </linearGradient>
  </defs>
  <!-- Wave 1 — bottom, full opacity -->
  <path d="M 8 65 C 22 42 46 38 72 18" stroke="url(#wg)" stroke-width="8.5" stroke-linecap="round" fill="none"/>
  <!-- Wave 2 — middle -->
  <path d="M 8 47 C 24 26 49 23 72 40" stroke="url(#wg)" stroke-width="8.5" stroke-linecap="round" fill="none" opacity="0.65"/>
  <!-- Wave 3 — top, softest -->
  <path d="M 8 29 C 26 12 52 10 72 60" stroke="url(#wg)" stroke-width="8.5" stroke-linecap="round" fill="none" opacity="0.35"/>
</svg>
