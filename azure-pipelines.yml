# Azure DevOps Pipeline for TCA-IRR Backend
# Deploys Python backend to Azure Web App using Kudu ZIP Deploy

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  backendAppName: 'tcairrapiccontainer'
  pythonVersion: '3.11'

stages:
  - stage: Build
    displayName: 'Build Stage'
    jobs:
      - job: BuildBackend
        displayName: 'Build Backend'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
            displayName: 'Use Python $(pythonVersion)'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: 'Install Python dependencies'

          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: '$(Build.SourcesDirectory)'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/backend.zip'
              replaceExistingArchive: true
            displayName: 'Archive backend files'

          - publish: '$(Build.ArtifactStagingDirectory)/backend.zip'
            artifact: backend
            displayName: 'Publish backend artifact'

  - stage: Deploy
    displayName: 'Deploy Stage'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployBackend
        displayName: 'Deploy Backend'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: backend
                
                - script: |
                    echo "================================================"
                    echo "  Deploying backend to $(backendAppName)"
                    echo "================================================"
                    
                    DEPLOY_URL="https://$(backendAppName).scm.azurewebsites.net/api/zipdeploy"
                    ZIP_FILE="$(Pipeline.Workspace)/backend/backend.zip"
                    
                    # Check if credentials are set
                    if [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_PASSWORD" ]; then
                      echo ""
                      echo "ERROR: Deployment credentials not configured!"
                      echo ""
                      echo "To fix this, add these pipeline variables as secrets:"
                      echo "  DEPLOY_USER     - from publish profile userName"
                      echo "  DEPLOY_PASSWORD - from publish profile userPWD"
                      echo ""
                      exit 1
                    fi
                    
                    # Debug: Show credential format (not values)
                    echo "DEPLOY_USER length: ${#DEPLOY_USER} chars"
                    echo "DEPLOY_USER starts with \$: $(echo "$DEPLOY_USER" | grep -c '^\$' || true)"
                    
                    echo "Uploading $(ls -lh "$ZIP_FILE" | awk '{print $5}') to Azure..."
                    
                    # Use base64 for auth to handle special characters
                    AUTH_HEADER=$(echo -n "$DEPLOY_USER:$DEPLOY_PASSWORD" | base64)
                    
                    HTTP_CODE=$(curl -X POST \
                      -H "Authorization: Basic $AUTH_HEADER" \
                      --data-binary @"$ZIP_FILE" \
                      -H "Content-Type: application/zip" \
                      -w "%{http_code}" \
                      -o /tmp/deploy_response.txt \
                      --silent \
                      "$DEPLOY_URL")
                    
                    echo "Response code: $HTTP_CODE"
                    
                    if [ "$HTTP_CODE" -eq "200" ] || [ "$HTTP_CODE" -eq "202" ]; then
                      echo ""
                      echo "================================================"
                      echo "  Deployment successful!"
                      echo "================================================"
                    else
                      echo ""
                      echo "Deployment failed with code: $HTTP_CODE"
                      echo "Response:"
                      cat /tmp/deploy_response.txt
                      echo ""
                      echo "Troubleshooting:"
                      echo "  - Verify DEPLOY_USER starts with \$ (e.g., \$tcairrapiccontainer)"
                      echo "  - Re-download publish profile and re-enter credentials"
                      echo "  - When entering DEPLOY_USER in Azure DevOps, use \$\$tcairrapiccontainer"
                      exit 1
                    fi
                  displayName: 'Deploy via Kudu ZIP Deploy'
                  env:
                    DEPLOY_USER: '$(DEPLOY_USER)'
                    DEPLOY_PASSWORD: '$(DEPLOY_PASSWORD)'

  - stage: Verify
    displayName: 'Verify Deployment'
    dependsOn: Deploy
    condition: succeeded()
    jobs:
      - job: HealthCheck
        displayName: 'Health Check'
        steps:
          - script: |
              echo "Waiting 30 seconds for deployment to stabilize..."
              sleep 30
              
              echo ""
              echo "Checking endpoints..."
              echo ""
              
              echo -n "GET /api/health: "
              response=$(curl -s -o /dev/null -w "%{http_code}" https://$(backendAppName).azurewebsites.net/api/health)
              echo "$response"
              
              echo -n "GET /api/ssd/audit/stats: "
              response=$(curl -s -o /dev/null -w "%{http_code}" https://$(backendAppName).azurewebsites.net/api/ssd/audit/stats)
              echo "$response"
              
              echo ""
              echo "Health checks complete!"
            displayName: 'Verify endpoints'
