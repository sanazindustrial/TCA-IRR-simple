# Azure DevOps Pipeline for TCA-IRR Backend
# Builds Docker image and pushes to Azure Container Registry (ACR)
# Container App has continuous deployment enabled via webhook

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # ACR Configuration
  acrLoginServer: 'tcairrresgistry-a4bahwbpegfve2gq.azurecr.io'
  imageName: 'tcaapi'
  imageTag: 'latest'
  # Full image reference
  imageRepository: '$(acrLoginServer)/$(imageName):$(imageTag)'

stages:
  - stage: BuildAndPush
    displayName: 'Build & Push Docker Image'
    jobs:
      - job: BuildPushImage
        displayName: 'Build and Push to ACR'
        steps:
          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: 'build'
              Dockerfile: '$(Build.SourcesDirectory)/dockerfile'
              buildContext: '$(Build.SourcesDirectory)'
              tags: |
                $(imageTag)
                $(Build.BuildId)
              arguments: '--no-cache'

          - task: Docker@2
            displayName: 'Login to ACR'
            inputs:
              command: 'login'
              containerRegistry: 'ACRConnection'

          - task: Docker@2
            displayName: 'Push Image to ACR'
            inputs:
              command: 'push'
              containerRegistry: 'ACRConnection'
              repository: '$(imageName)'
              tags: |
                $(imageTag)
                $(Build.BuildId)

          - script: |
              echo "================================================"
              echo "  Docker image pushed to ACR!"
              echo "================================================"
              echo ""
              echo "Image: $(acrLoginServer)/$(imageName):$(imageTag)"
              echo "Build ID tag: $(acrLoginServer)/$(imageName):$(Build.BuildId)"
              echo ""
              echo "Container App has continuous deployment enabled."
              echo "It will automatically pull the new image."
              echo "================================================"
            displayName: 'Deployment Summary'

  - stage: Verify
    displayName: 'Verify Deployment'
    dependsOn: BuildAndPush
    condition: succeeded()
    jobs:
      - job: HealthCheck
        displayName: 'Health Check'
        steps:
          - script: |
              echo "Waiting 60 seconds for Container App to pull new image..."
              sleep 60
              
              echo ""
              echo "Checking endpoints..."
              echo ""
              
              echo -n "GET /api/health: "
              response=$(curl -s -o /dev/null -w "%{http_code}" https://tcairrapiccontainer.azurewebsites.net/api/health)
              echo "$response"
              
              echo -n "GET /api/ssd/audit/stats: "
              response=$(curl -s -o /dev/null -w "%{http_code}" https://tcairrapiccontainer.azurewebsites.net/api/ssd/audit/stats)
              echo "$response"
              
              echo ""
              echo "Health checks complete!"
            displayName: 'Verify endpoints'
