# Azure DevOps Pipeline for TCA-IRR App
# Deploys backend and frontend to Azure Web Apps

trigger:
  branches:
    include:
      - main

parameters:
  - name: azureServiceConnection
    displayName: 'Azure Service Connection'
    type: string
    default: 'Azure-TCA-ServiceConnection'

pool:
  vmImage: 'ubuntu-latest'

variables:
  - name: backendAppName
    value: 'tcairrapiccontainer'
  - name: frontendAppName
    value: 'tca-irr'
  - name: resourceGroup
    value: 'Default-Web-EastUS'
  - name: pythonVersion
    value: '3.11'
  - name: nodeVersion
    value: '18.x'
  - name: serviceConnection
    value: ${{ parameters.azureServiceConnection }}

stages:
  - stage: Build
    displayName: 'Build Stage'
    jobs:
      - job: BuildBackend
        displayName: 'Build Backend'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
            displayName: 'Use Python $(pythonVersion)'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: 'Install Python dependencies'

          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: '$(Build.SourcesDirectory)'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/backend.zip'
              replaceExistingArchive: true
            displayName: 'Archive backend files'

          - publish: '$(Build.ArtifactStagingDirectory)/backend.zip'
            artifact: backend
            displayName: 'Publish backend artifact'

      - job: BuildFrontend
        displayName: 'Build Frontend'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Use Node.js $(nodeVersion)'

          - script: |
              npm ci
              npm run build
            displayName: 'Install and build frontend'

          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: '$(Build.SourcesDirectory)/.next'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/frontend.zip'
              replaceExistingArchive: true
            displayName: 'Archive frontend build'

          - publish: '$(Build.ArtifactStagingDirectory)/frontend.zip'
            artifact: frontend
            displayName: 'Publish frontend artifact'

  - stage: Deploy
    displayName: 'Deploy Stage'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DeployBackend
        displayName: 'Deploy Backend'
        steps:
          - download: current
            artifact: backend
          
          - task: AzureWebApp@1
            displayName: 'Deploy backend to Azure'
            inputs:
              azureSubscription: '$(serviceConnection)'
              appType: 'webAppLinux'
              appName: '$(backendAppName)'
              resourceGroupName: '$(resourceGroup)'
              package: '$(Pipeline.Workspace)/backend/backend.zip'
              runtimeStack: 'PYTHON|3.11'
              startUpCommand: 'python launch.py'

      - job: DeployFrontend
        displayName: 'Deploy Frontend'
        steps:
          - download: current
            artifact: frontend
          
          - task: AzureWebApp@1
            displayName: 'Deploy frontend to Azure'
            inputs:
              azureSubscription: '$(serviceConnection)'
              appType: 'webAppLinux'
              appName: '$(frontendAppName)'
              resourceGroupName: '$(resourceGroup)'
              package: '$(Pipeline.Workspace)/frontend/frontend.zip'
              runtimeStack: 'NODE|18-lts'

  - stage: Verify
    displayName: 'Verify Deployment'
    dependsOn: Deploy
    condition: succeeded()
    jobs:
      - job: HealthCheck
        displayName: 'Health Check'
        steps:
          - script: |
              echo "Waiting 30 seconds for deployment to stabilize..."
              sleep 30
              
              echo "Checking backend health..."
              response=$(curl -s -o /dev/null -w "%{http_code}" https://$(backendAppName).azurewebsites.net/api/health)
              echo "Backend /api/health: HTTP $response"
              
              echo "Checking SSD endpoint..."
              response=$(curl -s -o /dev/null -w "%{http_code}" https://$(backendAppName).azurewebsites.net/api/ssd/audit/stats)
              echo "SSD /api/ssd/audit/stats: HTTP $response"
              
              echo "Checking frontend..."
              response=$(curl -s -o /dev/null -w "%{http_code}" https://$(frontendAppName).azurewebsites.net)
              echo "Frontend: HTTP $response"
              
              echo "Health checks complete"
            displayName: 'Verify endpoints'
