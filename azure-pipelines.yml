# Azure DevOps Pipeline for TCA-IRR Full Deployment
# Deploys:
#   - Backend: Python zip deploy → Azure Web App (tcairrapiccontainer)
#   - Frontend: Next.js standalone build → Azure Web App (tca-irr)
#
# Required Pipeline Variables (Pipelines > Variables — mark passwords as secret):
#   BACKEND_PUBLISH_USER  = $tcairrapiccontainer
#   BACKEND_PUBLISH_PASS  = [backend Kudu publishing password]
#   FRONTEND_PUBLISH_USER = $TCA-IRR
#   FRONTEND_PUBLISH_PASS = [frontend Kudu publishing password]

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  BACKEND_APP: 'tcairrapiccontainer'
  FRONTEND_APP: 'tca-irr'
  NODE_VERSION: '20.x'

stages:

  # ─────────────────────────────────────────────────────────
  # STAGE 1: Build Backend (zip the backend/ directory)
  # ─────────────────────────────────────────────────────────
  - stage: BackendBuild
    displayName: 'Backend: Package Python App'
    jobs:
      - job: BuildBackend
        displayName: 'Zip backend/ for deployment'
        steps:
          - script: |
              echo "Packaging backend Python app..."
              cd backend
              zip -r ../backend_deploy.zip . \
                -x "**/__pycache__/*" \
                -x "**/*.pyc" \
                -x "**/.git*" \
                -x "**/node_modules/*" \
                -x "**/.pytest_cache/*" \
                -x "**/tests/*"
              cd ..
              echo "Package size: $(du -sh backend_deploy.zip)"
            displayName: 'Zip backend directory'

          - publish: backend_deploy.zip
            artifact: backend
            displayName: 'Publish backend artifact'

  # ─────────────────────────────────────────────────────────
  # STAGE 2: Deploy Backend via Kudu ZIP deploy
  # ─────────────────────────────────────────────────────────
  - stage: BackendDeploy
    displayName: 'Backend: Deploy to Azure Web App'
    dependsOn: BackendBuild
    condition: succeeded()
    jobs:
      - job: DeployBackend
        displayName: 'Deploy via Kudu ZIP deploy'
        steps:
          - download: current
            artifact: backend

          - script: |
              echo "Deploying backend to https://$(BACKEND_APP).azurewebsites.net ..."
              HTTP_STATUS=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
                -X POST \
                -u "$(BACKEND_PUBLISH_USER):$(BACKEND_PUBLISH_PASS)" \
                -T "$(Pipeline.Workspace)/backend/backend_deploy.zip" \
                "https://$(BACKEND_APP).scm.azurewebsites.net/api/zipdeploy?isAsync=true")
              echo "Kudu response: $HTTP_STATUS"
              cat /tmp/deploy_response.txt || true

              if [ "$HTTP_STATUS" = "202" ] || [ "$HTTP_STATUS" = "200" ]; then
                echo "Deployment accepted. Waiting 60s for startup..."
                sleep 60
              else
                echo "##[error]Deployment failed with HTTP $HTTP_STATUS"
                exit 1
              fi

              echo "Checking backend health..."
              HEALTH=$(curl -s -o /dev/null -w "%{http_code}" \
                https://$(BACKEND_APP).azurewebsites.net/api/v1/health)
              echo "Health check: $HEALTH"

              if [ "$HEALTH" = "200" ]; then
                echo "##[section]Backend deployed and healthy!"
              else
                echo "##[warning]Backend returned $HEALTH — may still be starting up"
              fi
            displayName: 'ZIP deploy and verify backend'
            env:
              BACKEND_PUBLISH_USER: $(BACKEND_PUBLISH_USER)
              BACKEND_PUBLISH_PASS: $(BACKEND_PUBLISH_PASS)

  # ─────────────────────────────────────────────────────────
  # STAGE 3: Build Frontend (Next.js standalone)
  # ─────────────────────────────────────────────────────────
  - stage: FrontendBuild
    displayName: 'Frontend: Next.js Build'
    jobs:
      - job: BuildFrontend
        displayName: 'Build Next.js standalone'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'
            displayName: 'Setup Node.js $(NODE_VERSION)'

          - script: npm ci --legacy-peer-deps
            displayName: 'Install dependencies'

          - script: npm run build
            displayName: 'Build Next.js (standalone)'
            env:
              NEXT_PUBLIC_API_URL: 'https://tcairrapiccontainer.azurewebsites.net'
              NODE_OPTIONS: '--max-old-space-size=4096'

          - script: |
              echo "Preparing deployment package..."
              # Copy static assets into standalone
              cp -r .next/static .next/standalone/.next/static
              cp -r public .next/standalone/public

              # Package the standalone directory
              cd .next/standalone
              zip -r ../../frontend_deploy.zip . \
                -x "*/.git*" \
                -x "*/cache/*"
              cd ../..
              echo "Package size: $(du -sh frontend_deploy.zip)"
            displayName: 'Package standalone build'

          - publish: frontend_deploy.zip
            artifact: frontend
            displayName: 'Publish frontend artifact'

  # ─────────────────────────────────────────────────────────
  # STAGE 4: Deploy Frontend to Azure Web App
  # ─────────────────────────────────────────────────────────
  - stage: FrontendDeploy
    displayName: 'Frontend: Deploy to Azure Web App'
    dependsOn: FrontendBuild
    condition: succeeded()
    jobs:
      - job: DeployFrontend
        displayName: 'Deploy via Kudu ZIP deploy'
        steps:
          - download: current
            artifact: frontend

          - script: |
              echo "Deploying frontend to https://$(FRONTEND_APP).azurewebsites.net ..."
              curl -X POST \
                -u "$(FRONTEND_PUBLISH_USER):$(FRONTEND_PUBLISH_PASS)" \
                -T "$(Pipeline.Workspace)/frontend/frontend_deploy.zip" \
                "https://$(FRONTEND_APP).scm.azurewebsites.net/api/zipdeploy?isAsync=true" \
                --fail --show-error

              echo "Waiting 60s for deployment to complete..."
              sleep 60

              echo "Verifying frontend..."
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                https://$(FRONTEND_APP).azurewebsites.net/)
              echo "Frontend HTTP status: $STATUS"

              if [ "$STATUS" = "200" ] || [ "$STATUS" = "308" ]; then
                echo "##[section]Frontend deployed successfully!"
              else
                echo "##[warning]Frontend returned $STATUS"
              fi
            displayName: 'ZIP deploy and verify frontend'
            env:
              FRONTEND_PUBLISH_USER: $(FRONTEND_PUBLISH_USER)
              FRONTEND_PUBLISH_PASS: $(FRONTEND_PUBLISH_PASS)
