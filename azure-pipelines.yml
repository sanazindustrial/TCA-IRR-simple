# Azure DevOps Pipeline for TCA-IRR App
# Uses Publish Profile credentials (no service connection required)

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - name: backendAppName
    value: 'tcairrapiccontainer'
  - name: frontendAppName
    value: 'tca-irr'
  - name: pythonVersion
    value: '3.11'
  - name: nodeVersion
    value: '18.x'

stages:
  - stage: Build
    displayName: 'Build Stage'
    jobs:
      - job: BuildBackend
        displayName: 'Build Backend'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
            displayName: 'Use Python $(pythonVersion)'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: 'Install Python dependencies'

          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: '$(Build.SourcesDirectory)'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/backend.zip'
              replaceExistingArchive: true
            displayName: 'Archive backend files'

          - publish: '$(Build.ArtifactStagingDirectory)/backend.zip'
            artifact: backend
            displayName: 'Publish backend artifact'

      - job: BuildFrontend
        displayName: 'Build Frontend'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Use Node.js $(nodeVersion)'

          - script: |
              npm ci
              npm run build
            displayName: 'Install and build frontend'

          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: '$(Build.SourcesDirectory)/.next'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/frontend.zip'
              replaceExistingArchive: true
            displayName: 'Archive frontend build'

          - publish: '$(Build.ArtifactStagingDirectory)/frontend.zip'
            artifact: frontend
            displayName: 'Publish frontend artifact'

  - stage: Deploy
    displayName: 'Deploy Stage'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DeployBackend
        displayName: 'Deploy Backend via Kudu'
        steps:
          - download: current
            artifact: backend
          
          - script: |
              echo "Deploying backend to $(backendAppName)..."
              
              # Deploy using Kudu ZIP deploy API with publish profile credentials
              DEPLOY_URL="https://$(backendAppName).scm.azurewebsites.net/api/zipdeploy"
              ZIP_FILE="$(Pipeline.Workspace)/backend/backend.zip"
              
              HTTP_CODE=$(curl -X POST \
                -u "$(BACKEND_PUBLISH_USER):$(BACKEND_PUBLISH_PASSWORD)" \
                --data-binary @"$ZIP_FILE" \
                -H "Content-Type: application/zip" \
                -w "%{http_code}" \
                -o /tmp/deploy_response.txt \
                "$DEPLOY_URL" 2>/dev/null)
              
              echo "Deployment response code: $HTTP_CODE"
              
              if [ "$HTTP_CODE" -eq "200" ] || [ "$HTTP_CODE" -eq "202" ]; then
                echo "Backend deployment successful!"
              else
                echo "Backend deployment failed with code: $HTTP_CODE"
                cat /tmp/deploy_response.txt
                exit 1
              fi
            displayName: 'Deploy backend to Azure'
            env:
              BACKEND_PUBLISH_USER: $(BACKEND_PUBLISH_USER)
              BACKEND_PUBLISH_PASSWORD: $(BACKEND_PUBLISH_PASSWORD)

      - job: DeployFrontend
        displayName: 'Deploy Frontend via Kudu'
        steps:
          - download: current
            artifact: frontend
          
          - script: |
              echo "Deploying frontend to $(frontendAppName)..."
              
              DEPLOY_URL="https://$(frontendAppName).scm.azurewebsites.net/api/zipdeploy"
              ZIP_FILE="$(Pipeline.Workspace)/frontend/frontend.zip"
              
              HTTP_CODE=$(curl -X POST \
                -u "$(FRONTEND_PUBLISH_USER):$(FRONTEND_PUBLISH_PASSWORD)" \
                --data-binary @"$ZIP_FILE" \
                -H "Content-Type: application/zip" \
                -w "%{http_code}" \
                -o /tmp/deploy_response.txt \
                "$DEPLOY_URL" 2>/dev/null)
              
              echo "Deployment response code: $HTTP_CODE"
              
              if [ "$HTTP_CODE" -eq "200" ] || [ "$HTTP_CODE" -eq "202" ]; then
                echo "Frontend deployment successful!"
              else
                echo "Frontend deployment failed with code: $HTTP_CODE"
                cat /tmp/deploy_response.txt
                exit 1
              fi
            displayName: 'Deploy frontend to Azure'
            env:
              FRONTEND_PUBLISH_USER: $(FRONTEND_PUBLISH_USER)
              FRONTEND_PUBLISH_PASSWORD: $(FRONTEND_PUBLISH_PASSWORD)

  - stage: Verify
    displayName: 'Verify Deployment'
    dependsOn: Deploy
    condition: succeeded()
    jobs:
      - job: HealthCheck
        displayName: 'Health Check'
        steps:
          - script: |
              echo "Waiting 30 seconds for deployment to stabilize..."
              sleep 30
              
              echo "Checking backend health..."
              response=$(curl -s -o /dev/null -w "%{http_code}" https://$(backendAppName).azurewebsites.net/api/health)
              echo "Backend /api/health: HTTP $response"
              
              echo "Checking SSD endpoint..."
              response=$(curl -s -o /dev/null -w "%{http_code}" https://$(backendAppName).azurewebsites.net/api/ssd/audit/stats)
              echo "SSD /api/ssd/audit/stats: HTTP $response"
              
              echo "Checking frontend..."
              response=$(curl -s -o /dev/null -w "%{http_code}" https://$(frontendAppName).azurewebsites.net)
              echo "Frontend: HTTP $response"
              
              echo "Health checks complete"
            displayName: 'Verify endpoints'
