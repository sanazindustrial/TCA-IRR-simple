# Azure DevOps Pipeline for TCA-IRR Backend
# Builds Docker image and pushes to Azure Container Registry (ACR)
# 
# AUTO-DEPLOY SETUP: 
# 1. Go to Azure DevOps > Pipelines > [This Pipeline] > Edit > Variables
# 2. Add: ACR_USERNAME = tcairrresgistry
# 3. Add: ACR_PASSWORD = [your password from Azure Portal] (mark as secret)
# 4. Save - now every push to main will auto-deploy!

trigger:
  branches:
    include:
      - main

# Runtime parameters - used as fallback if variables not set
parameters:
  - name: acrUsername
    displayName: 'ACR Username (leave empty to use pipeline variable)'
    type: string
    default: ''
  - name: acrPassword
    displayName: 'ACR Password (leave empty to use pipeline variable)'
    type: string
    default: ''

pool:
  vmImage: 'ubuntu-latest'

variables:
  acrLoginServer: 'tcairrresgistry.azurecr.io'
  imageName: 'tcaapi'
  imageTag: 'latest'

stages:
  - stage: BuildAndPush
    displayName: 'Build & Push Docker Image'
    jobs:
      - job: BuildPushImage
        displayName: 'Build and Push to ACR'
        steps:
          - script: |
              echo "Building Docker image..."
              docker build -t $(acrLoginServer)/$(imageName):$(imageTag) -t $(acrLoginServer)/$(imageName):$(Build.BuildId) -f dockerfile .
            displayName: 'Build Docker Image'

          - script: |
              # Use pipeline variables if set, otherwise use parameters
              ACR_USER="${ACR_USERNAME:-${{ parameters.acrUsername }}}"
              ACR_PASS="${ACR_PASSWORD:-${{ parameters.acrPassword }}}"
              
              if [ -z "$ACR_USER" ] || [ -z "$ACR_PASS" ]; then
                echo "##[error]ACR credentials not configured!"
                echo "##[error]Either set pipeline variables (ACR_USERNAME, ACR_PASSWORD)"
                echo "##[error]or provide them when running the pipeline manually."
                exit 1
              fi
              
              echo "Logging into ACR..."
              echo "$ACR_PASS" | docker login $(acrLoginServer) -u "$ACR_USER" --password-stdin
              
              echo "Pushing images to ACR..."
              docker push $(acrLoginServer)/$(imageName):$(imageTag)
              docker push $(acrLoginServer)/$(imageName):$(Build.BuildId)
              
              echo "================================================"
              echo "  Docker image pushed to ACR!"
              echo "================================================"
              echo "Image: $(acrLoginServer)/$(imageName):$(imageTag)"
              echo "Container App will auto-deploy via webhook."
              echo "================================================"
            displayName: 'Push to ACR'
            env:
              ACR_USERNAME: $(ACR_USERNAME)
              ACR_PASSWORD: $(ACR_PASSWORD)

  - stage: Verify
    displayName: 'Verify Deployment'
    dependsOn: BuildAndPush
    condition: succeeded()
    jobs:
      - job: HealthCheck
        displayName: 'Health Check'
        steps:
          - script: |
              echo "Waiting 60 seconds for Container App to pull new image..."
              sleep 60
              
              echo ""
              echo "Checking endpoints..."
              echo ""
              
              echo -n "GET /api/health: "
              response=$(curl -s -o /dev/null -w "%{http_code}" https://tcairrapiccontainer.azurewebsites.net/api/health)
              echo "$response"
              
              echo -n "GET /api/ssd/audit/stats: "
              response=$(curl -s -o /dev/null -w "%{http_code}" https://tcairrapiccontainer.azurewebsites.net/api/ssd/audit/stats)
              echo "$response"
              
              echo ""
              echo "Health checks complete!"
            displayName: 'Verify endpoints'
