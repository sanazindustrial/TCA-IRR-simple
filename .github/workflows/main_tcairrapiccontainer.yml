# Last triggered: 2026-04-23
name: Build and deploy Python backend to Azure Web App - tcairrapiccontainer

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/main_tcairrapiccontainer.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Zip artifact for deployment
        run: |
          cd backend
          zip -r ../backend-deploy.zip . \
            --exclude "*.pyc" \
            --exclude "*/__pycache__/*" \
            --exclude "*/.pytest_cache/*" \
            --exclude "*/tests/*" \
            --exclude "*.log" \
            --exclude ".env*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-backend
          path: backend-deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Production"
      url: https://tcairrapiccontainer.azurewebsites.net

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-backend

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'tcairrapiccontainer'
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: backend-deploy.zip
          startup-command: 'python start_production.py'
