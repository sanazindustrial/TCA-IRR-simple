# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - TCA-IRR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://tcairrapiccontainer.azurewebsites.net

      - name: Prepare standalone deployment
        run: |
          set -ex
          
          echo "=== Checking .next structure ==="
          ls -la .next/
          ls -la .next/standalone/ || true
          
          echo "=== Creating deploy folder ==="
          mkdir -p deploy-package
          
          echo "=== Copying standalone output ==="
          if [ -d ".next/standalone" ]; then
            cp -r .next/standalone/. deploy-package/
          else
            echo "ERROR: .next/standalone not found!"
            exit 1
          fi
          
          echo "=== Copying static assets ==="
          if [ -d ".next/static" ]; then
            mkdir -p deploy-package/.next/static
            cp -r .next/static/. deploy-package/.next/static/
          fi
          
          echo "=== Copying public folder ==="
          if [ -d "public" ]; then
            cp -r public deploy-package/public
          fi
          
          echo "=== Creating package.json ==="
          cat > deploy-package/package.json << 'EOF'
          {"name":"tca-irr","version":"1.0.0","scripts":{"start":"node server.js"}}
          EOF
          
          echo "=== Final Structure ==="
          find deploy-package -maxdepth 2 -type f | head -20
          echo "=== node_modules count ==="
          ls deploy-package/node_modules 2>/dev/null | wc -l || echo "0"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy-package/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'TCA-IRR'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8EEB615CA3AE4C7894E3645EF2B2C0A7 }}