# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - TCA-IRR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://tcairrapiccontainer.azurewebsites.net

      - name: Prepare standalone deployment
        run: |
          set -ex

          echo "=== Checking .next structure ==="
          ls -la .next/
          ls -la .next/standalone/ || true

          echo "=== Creating deploy folder ==="
          mkdir -p deploy-package

          echo "=== Copying standalone output ==="
          if [ -d ".next/standalone" ]; then
            cp -r .next/standalone/. deploy-package/
          else
            echo "ERROR: .next/standalone not found!"
            exit 1
          fi

          echo "=== Copying static assets ==="
          if [ -d ".next/static" ]; then
            mkdir -p deploy-package/.next/static
            cp -r .next/static/. deploy-package/.next/static/
          fi

          echo "=== Copying public folder ==="
          if [ -d "public" ]; then
            cp -r public deploy-package/public
          fi

          echo "=== Copying env files ==="
          cp .env.production deploy-package/.env.production 2>/dev/null || true
          cp .env deploy-package/.env 2>/dev/null || true

          echo "=== Creating package.json ==="
          cat > deploy-package/package.json << 'EOF'
          {"name":"tca-irr","version":"1.0.0","scripts":{"start":"node server.js"}}
          EOF

          echo "=== Final Structure ==="
          find deploy-package -maxdepth 2 -type f | head -20
          echo "=== node_modules count ==="
          ls deploy-package/node_modules 2>/dev/null | wc -l || echo "0"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy-package/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Production"
      url: https://tca-irr.azurewebsites.net

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Create deployment zip
        run: |
          echo "=== Creating deployment zip ==="
          ls -la
          zip -r deploy.zip . -x "*.git*"
          ls -la deploy.zip

      - name: Deploy to Azure Web App
        env:
          KUDU_PASS: ${{ secrets.AZURE_KUDU_PASS }}
        run: |
          echo "=== Deploying via Kudu OneDeploy ==="
          HTTP_STATUS=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
            -X POST \
            -u "\$TCA-IRR:${KUDU_PASS}" \
            --data-binary "@deploy.zip" \
            -H "Content-Type: application/zip" \
            "https://tca-irr.scm.azurewebsites.net/api/publish?type=zip")
          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/deploy_response.txt || true
          if [[ "$HTTP_STATUS" != "200" && "$HTTP_STATUS" != "202" && "$HTTP_STATUS" != "204" ]]; then
            echo "Deployment failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Deployment triggered successfully"

      - name: Verify deployment
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://tca-irr.azurewebsites.net)
          echo "App status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: App returned $STATUS instead of 200"
          fi

