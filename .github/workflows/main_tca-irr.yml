# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - TCA-IRR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://tcairrapiccontainer.azurewebsites.net

      - name: Prepare standalone deployment
        run: |
          set -ex

          echo "=== Checking .next structure ==="
          ls -la .next/
          ls -la .next/standalone/ || true

          echo "=== Creating deploy folder ==="
          mkdir -p deploy-package

          echo "=== Copying standalone output ==="
          if [ -d ".next/standalone" ]; then
            cp -r .next/standalone/. deploy-package/
          else
            echo "ERROR: .next/standalone not found!"
            exit 1
          fi

          echo "=== Copying static assets ==="
          if [ -d ".next/static" ]; then
            mkdir -p deploy-package/.next/static
            cp -r .next/static/. deploy-package/.next/static/
          fi

          echo "=== Copying public folder ==="
          if [ -d "public" ]; then
            cp -r public deploy-package/public
          fi

          echo "=== Copying env files ==="
          cp .env.production deploy-package/.env.production 2>/dev/null || true
          cp .env deploy-package/.env 2>/dev/null || true

          echo "=== Creating package.json ==="
          cat > deploy-package/package.json << 'EOF'
          {"name":"tca-irr","version":"1.0.0","scripts":{"start":"node server.js"},"engines":{"node":">=20.0.0"}}
          EOF

          echo "=== Creating web.config for IIS (Windows App Service) ==="
          cat > deploy-package/web.config << 'WEBEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <system.webServer>
              <webSocket enabled="false" />
              <handlers>
                <add name="iisnode" path="server.js" verb="*" modules="iisnode"/>
              </handlers>
              <rewrite>
                <rules>
                  <rule name="NodeApp" patternSyntax="ECMAScript" stopProcessing="true">
                    <match url=".*" />
                    <conditions logicalGrouping="MatchAll">
                      <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True" />
                    </conditions>
                    <action type="Rewrite" url="server.js" />
                  </rule>
                </rules>
              </rewrite>
              <httpErrors existingResponse="PassThrough" />
              <security>
                <requestFiltering>
                  <hiddenSegments>
                    <remove segment="bin" />
                  </hiddenSegments>
                </requestFiltering>
              </security>
            </system.webServer>
          </configuration>
          WEBEOF

          echo "=== Final Structure ==="
          find deploy-package -maxdepth 2 -type f | head -20
          echo "=== node_modules count ==="
          ls deploy-package/node_modules 2>/dev/null | wc -l || echo "0"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy-package/
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Production"
      url: https://tca-irr.azurewebsites.net

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: tca-irr
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
