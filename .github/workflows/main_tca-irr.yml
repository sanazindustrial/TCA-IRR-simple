# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - TCA-IRR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://tcairrapiccontainer.azurewebsites.net

      - name: Prepare standalone deployment
        run: |
          # Debug: show what's in .next/standalone
          echo "=== .next/standalone contents ==="
          ls -la .next/standalone/ || echo "No standalone folder!"
          
          # Copy entire standalone output
          cp -r .next/standalone deploy-package
          
          # Copy static assets into .next/static (required for Next.js)
          mkdir -p deploy-package/.next/static
          cp -r .next/static/* deploy-package/.next/static/
          
          # Copy public folder
          cp -r public deploy-package/public
          
          # Create simple package.json for Azure
          echo '{"name":"tca-irr","version":"1.0.0","scripts":{"start":"node server.js"}}' > deploy-package/package.json
          
          # Debug: show final structure
          echo "=== Deploy Package Structure ==="
          ls -la deploy-package/
          echo "=== .next folder ==="
          ls -la deploy-package/.next/ || echo "No .next"
          echo "=== node_modules count ==="
          ls deploy-package/node_modules | wc -l

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy-package/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'TCA-IRR'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8EEB615CA3AE4C7894E3645EF2B2C0A7 }}